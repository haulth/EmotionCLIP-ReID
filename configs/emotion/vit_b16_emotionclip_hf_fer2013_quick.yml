MODEL:
  DEVICE: cuda
  NAME: ViT-B-16
  STRIDE_SIZE: [16, 16]
  EMOTION:
    N_CTX: 4
    ADAPTER_DIM: 64
    ADAPTER_DROPOUT: 0.0
    TOPK_PATCHES: 5
    GLOBAL_WEIGHT: 1.0
    LOCAL_WEIGHT: 0.5
    CLASSIFIER_WEIGHT: 1.0
    TRAIN_LAST_BLOCKS: 1
    STAGE1_WEIGHT: ""

INPUT:
  SIZE_TRAIN: [224, 224]
  SIZE_TEST: [224, 224]
  PROB: 0.5
  COLOR_JITTER: 0.05
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]

DATASETS:
  MANIFEST: data/hf_fer2013/manifest.jsonl
  ROOT_DIR: data/hf_fer2013/images
  STRICT_SPLIT_LEAKAGE: true

DATALOADER:
  NUM_WORKERS: 0
  PIN_MEMORY: false

SOLVER:
  SEED: 1234
  STAGE1:
    IMS_PER_BATCH: 64
    MAX_EPOCHS: 2
    BASE_LR: 0.00035
    WEIGHT_DECAY: 0.0001
    CHECKPOINT_PERIOD: 1
    LOG_PERIOD: 20
  STAGE2:
    IMS_PER_BATCH: 32
    MAX_EPOCHS: 3
    BASE_LR: 0.000005
    WEIGHT_DECAY: 0.0001
    CHECKPOINT_PERIOD: 1
    EVAL_PERIOD: 1
    LOG_PERIOD: 20
    BETA_ALIGN: 0.5
    LAMBDA_UNC: 0.05
    EDL_ANNEALING_EPOCHS: 3

TEST:
  IMS_PER_BATCH: 64
  WEIGHT: ""

TRAIN:
  RUN_STAGE1: true
  RUN_STAGE2: true

OUTPUT_DIR: outputs/emotionclip_hf_fer2013_quick
